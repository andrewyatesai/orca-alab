# Manual macOS packaging lane (staging-launch audit F15). workflow_dispatch
# only — the fork has no tag-driven release automation by design. Produces
# unsigned (ad-hoc) dmg/zip artifacts and hard-fails if any packaged app's
# native binaries (orca-daemon, orca_node.node) are missing an arch slice the
# app claims to support — the F2 "arm64 app, x64-only daemon" failure mode.
name: release-mac

on:
  workflow_dispatch:
    inputs:
      arches:
        description: "Comma-separated mac arches to build (e.g. arm64 or x64,arm64). Empty = runner host arch only."
        required: false
        default: ""
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-mac:
    name: build + arch-assert (${{ inputs.arches || 'host arch' }})
    runs-on: macos-15
    timeout-minutes: 120
    env:
      # Passthrough consumed by config/electron-builder.config.cjs
      # (macTargetArches); empty string falls back to host-arch-only.
      ORCA_MAC_BUILD_ARCHES: ${{ inputs.arches }}
      # No signing identity exists on CI runners; skip discovery so
      # electron-builder produces ad-hoc-signed artifacts instead of failing.
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      # build:desktop runs verify-telemetry-constants.mjs --preflight, which
      # hard-fails without a PostHog write key. This lane ships smoke-test
      # artifacts only (never distributables), so dark builds are acceptable;
      # real releases inject the key via build:mac:release on a signing machine.
      ORCA_ALLOW_NO_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true # rust/aterm feeds build:rust-daemon + build:terminal-addon
          token: ${{ secrets.ATERM_SUBMODULE_TOKEN || github.token }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          # Both darwin stds up front: mac-build-arches.mjs asserts the rustup
          # std for every requested arch, so a non-host `arches` input (e.g.
          # x64 on an arm64 runner) fails fast without these.
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust
            native/orca-node
      - run: pnpm install --frozen-lockfile
      - name: Build mac app (dmg + zip)
        run: pnpm run build:mac
      - name: Assert packaged native binary architectures
        # The packaging step itself gains an afterPack arch assertion from the
        # ship-vehicle workstream (config/scripts/); this step is the always-on
        # workflow-level backstop and does not depend on that script existing.
        # Expected arch is derived from each unpacked app dir electron-builder
        # emits: dist/mac → x86_64, dist/mac-arm64 → arm64, universal → both.
        # Glob is *.app, not a fixed name: productName forks by build identity
        # ("Orca Staging" by default — config/electron-builder.config.cjs).
        run: |
          set -euo pipefail
          found=0
          for app in dist/mac*/*.app; do
            [ -d "$app" ] || continue
            found=1
            dir="$(basename "$(dirname "$app")")"
            case "$dir" in
              mac) want="x86_64" ;;
              mac-arm64) want="arm64" ;;
              mac-universal) want="x86_64 arm64" ;;
              *) echo "FAIL: unrecognized electron-builder output dir '$dir'"; exit 1 ;;
            esac
            for bin in orca-daemon orca_node.node; do
              p="$app/Contents/Resources/$bin"
              if [ ! -f "$p" ]; then
                echo "FAIL: $p is missing from the packaged app"
                exit 1
              fi
              archs="$(lipo -archs "$p")"
              for a in $want; do
                case " $archs " in
                  *" $a "*) ;;
                  *)
                    echo "FAIL: $p contains '$archs' but the $dir app requires '$a'"
                    echo "      (native binaries were built for the wrong arch — see docs/reference/ci.md)"
                    exit 1
                    ;;
                esac
              done
              echo "OK: $p ($archs)"
            done
          done
          if [ "$found" != 1 ]; then
            echo "FAIL: no packaged app found under dist/mac*/"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: orca-mac-${{ github.run_id }}
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
          retention-days: 14
