[package]
name = "aterm-ctl"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "aterm — a std-only command-line client for the aterm introspection control socket (v1)."

[[bin]]
name = "aterm-ctl"
path = "src/main.rs"

[dependencies]
# Engine-side socket naming/discovery decisions, shared with the server so
# the two can never drift. Platform-free; no external dependencies.
aterm-types = { workspace = true }
