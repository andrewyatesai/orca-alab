[package]
name = "aterm-gpu-web"
version = "0.0.1"
edition = "2021"
description = "wasm-bindgen binding: the aterm engine (aterm-core) + the aterm-gpu WebGPU renderer (wgpu -> WebGPU on wasm32), rendering a terminal onto a <canvas> in the Electron renderer. The GPU sibling of the aterm-wasm crate (which is the CPU/putImageData path)."
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# aterm engine + the GPU renderer (vendored under rust/aterm). default-features =
# false drops the engine's disk-tier cold scrollback (libc mmap + zstd-sys C), which
# cannot target wasm32 — a renderer needs only the RAM/LZ4 tiers. aterm-gpu itself
# now also stops FORCING disk-tier (its deps are default-features = false), so the
# GPU crate's whole closure is wasm32-clean.
aterm-core = { path = "../aterm-core", default-features = false, features = ["sixel"] }
aterm-render = { path = "../aterm-render", default-features = false }
aterm-render-api = { path = "../aterm-render-api", default-features = false }
aterm-gpu = { path = "../aterm-gpu" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
# wgpu's WebGL2 backend on wasm32 — orca's deliberate terminal-acceleration target
# (the renderer accelerates via WebGL; production refuses unsafe-WebGPU). WebGL2
# supports the same instanced-quad + R8/Rgba8 glyph-atlas pipeline as WebGPU, so no
# pipeline code changes. default-features = false drops the native backends
# (metal/vulkan/dx12/gles); the wasm closure pulls only the WebGL path via
# wasm-bindgen/web-sys. fragile-send-sync-non-atomic-wasm lets the !Send GPU handles
# satisfy wgpu's Send/Sync bounds on the single-threaded browser main thread.
# Kept under the wasm32 target table so the native workspace build of this crate
# never pulls wgpu's WebGL closure — it only needs the engine deps above to compile.
wgpu = { version = "29", default-features = false, features = ["webgl", "wgsl", "fragile-send-sync-non-atomic-wasm"] }

# wgpu 29 requires wasm-bindgen >= 0.2.108; pin it exact so the generated glue
# matches the wasm-bindgen CLI version (a mismatch makes `wasm-bindgen --target web`
# refuse). aterm-wasm is aligned to the same 0.2.108 so both web crates share the
# one workspace lock.
wasm-bindgen = "=0.2.108"
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1"
# The browser DOM types the WebGL init path needs: the <canvas> handed in from JS,
# and (TODO, present loop) the window/raf bindings. wgpu's `webgl` feature already
# enables HtmlCanvasElement + WebGl2RenderingContext; declared here too so this
# crate's own code can name the canvas type.
web-sys = { version = "0.3", features = ["HtmlCanvasElement", "Window", "Document"] }
js-sys = "0.3"
# Transitive deps may pull getrandom; on wasm32-unknown-unknown it needs the JS
# backend. Harmless if unused.
getrandom = { version = "0.2", features = ["js"] }

# NOTE: no per-crate [profile.release] — profiles only take effect from the
# workspace root, which already sets lto/codegen-units=1/strip for release. A wasm
# size build (opt-level="z") is driven by the build tool's --profile, not here.
