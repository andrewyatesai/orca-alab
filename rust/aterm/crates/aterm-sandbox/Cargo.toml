[package]
name = "aterm-sandbox"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Resource sandbox for spawned children (ATERM_DESIGN WS-G): POSIX rlimits applied before exec, gated on an aterm-cap capability."

[features]
default = []
# TRUST_NATIVE_TLA Phase 2: compile the source↔spec `#[refines]`/`#[spec_unmodeled]`
# anchors that bind this crate's sandbox-apply code to the external `Sandbox.tla`
# spec. OFF by default so the production build is byte-identical (no `aterm-spec`
# dependency, no `inventory` submission); the workspace `spec_xref_closure` gate
# (aterm-gui's test build) enables it to COLLECT the anchors cross-crate.
spec-anchors = ["dep:aterm-spec"]

[dependencies]
aterm-cap = { workspace = true }
libc = { workspace = true }
# Optional: only pulled in by the off-by-default `spec-anchors` feature (the macro
# emits `::aterm_spec::inventory::submit!` anchor records; nothing else uses it).
aterm-spec = { workspace = true, optional = true }

[dev-dependencies]
# The Tier-1 conformance test (`tests/conformance_sandbox.rs`) needs the derived/
# external spec machinery and `ty`; the anchors it relies on are compiled via the
# crate's own test build (`cfg(test)`), so no feature is needed for the test itself.
aterm-spec = { workspace = true }
aterm-spec-models = { workspace = true }
aterm-cap = { workspace = true }

[lints]
workspace = true
