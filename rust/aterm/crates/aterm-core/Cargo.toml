[package]
name = "aterm-core"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "aterm — lean, headless VT terminal engine core"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(loom)', 'cfg(miri)', 'cfg(fuzzing)'] }

[features]
default = []
# Opt-in heavyweight stress/stability integration tests (tests/stress_stability.rs).
# Off by default to keep CI fast: `cargo test -p aterm-core --features long-tests`.
long-tests = []
# Opt-in UAX #9 BiDi visual reordering bridge (terminal/bidi_reorder.rs). OFF by
# default: with the feature off, `aterm-bidi` is not compiled into the engine and
# the build is byte-identical. Consumers that render mixed LTR/RTL text enable it
# to reach `Terminal::bidi_visual_order`. The render-time application of the
# returned permutation is the renderer's job (the remaining integration step).
bidi = ["dep:aterm-bidi"]
# TRUST_NATIVE_TLA Phase 2: compile the source↔spec `#[refines]`/`#[spec_unmodeled]`
# anchors as part of the LIBRARY (not just the unit-test build) so a DOWNSTREAM test
# binary — the relocated `spec_xref_closure` gate in aterm-gui's test build — can
# COLLECT them via `inventory`. OFF by default: the production `cargo build` is
# byte-identical (no `aterm-spec` in the closure, no `inventory` submissions). The
# anchors stay `#[cfg_attr(any(test, feature = "spec-anchors"), …)]`, so aterm-core's
# OWN unit-test build still expands them (Phase 0 unchanged) AND aterm-gui's gate
# enables this feature to see them cross-crate.
spec-anchors = ["dep:aterm-spec"]

[dependencies]
aterm-error = { workspace = true }
# Optional: pulled into the LIBRARY only by the off-by-default `spec-anchors`
# feature (the anchor macros emit `::aterm_spec::inventory::submit!`). Still a
# dev-dependency below for aterm-core's own test build (Phase 0 gate + conformance).
aterm-spec = { workspace = true, optional = true }
aterm-log = { workspace = true }
aterm-alloc = { workspace = true }
aterm-bits = { workspace = true }
aterm-hash = { workspace = true }
aterm-codec = { workspace = true }
aterm-rle = { workspace = true }
aterm-tempfile = { workspace = true }
aterm-types = { workspace = true }
aterm-provenance = { workspace = true, features = ["internal-mint"] }
aterm-grapheme = { workspace = true }
aterm-grid = { workspace = true, features = ["alacritty-compat"] }
aterm-parser = { workspace = true }
aterm-scrollback = { workspace = true }
aterm-ffi-types = { workspace = true }
aterm-policy = { workspace = true }
aterm-vi = { workspace = true }
aterm-selection = { workspace = true }
# `regex` enables regex-mode scrollback search (TerminalSearch::search_results_opts
# with is_regex = true), surfaced by the GUI introspection `search` verb (SEARCH-1).
aterm-search = { workspace = true, features = ["regex"] }
aterm-shell-integration = { workspace = true }
aterm-containment = { workspace = true }
# Optional: UAX #9 BiDi reordering, pulled in only by the off-by-default `bidi`
# feature. Not in the default production closure.
aterm-bidi = { workspace = true, optional = true }

[dev-dependencies]
# Test-only: trigger evaluation (`#[cfg(test)] mod triggers`, test_support/triggers/*)
# is the sole `regex` consumer. Kept out of the production closure (§2.7 / A-4).
regex = { workspace = true }
proptest = { workspace = true }
aterm-spec = { workspace = true }
# Test-only: the `spec_xref_closure` gate (terminal/spec_xref_gate.rs) resolves
# external `.tla` machine names against the ISOLATION-family specs in this crate
# (TRUST_NATIVE_TLA §2.2 obligation 4). Test-only, so it stays out of the
# production closure.
aterm-spec-models = { workspace = true }
# Test-only: expose aterm-grid's testing-gated facade items (ExtendedStyleInfo,
# DamageRect, with_style_id, is_combining_mark, …) re-exported under
# `#[cfg(any(test, feature = "testing"))]` in `grid/mod.rs`. Resolver 2
# keeps this out of the production `cargo build`.
aterm-grid = { workspace = true, features = ["alacritty-compat", "testing"] }
