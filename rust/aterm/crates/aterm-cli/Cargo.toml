[package]
name = "aterm-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "aterm — a transparent, introspecting terminal: runs your shell unchanged while the engine builds a live model the AI can read (U1)."

[[bin]]
name = "aterm"
path = "src/main.rs"

[dependencies]
aterm-core = { workspace = true }
libc = { workspace = true }
# P0: the daily-driver CLI runs the shell through the PROTECTED spawn seam
# (cap-gated + setrlimit-bounded + fail-closed fork/exec + OS-sandbox-wrapped when
# the mode demands it), exactly like aterm-gui — not raw forkpty/execvp.
aterm-pty = { workspace = true }
aterm-cap = { workspace = true }
aterm-sandbox = { workspace = true }
aterm-containment = { workspace = true }

[lints]
workspace = true
