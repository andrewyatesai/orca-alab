[package]
name = "aterm-spec-models"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "TLA+ models of aterm's kernel/security/concurrency invariants (ROADMAP WS-I), model-checked by `ty` from the test suite."

# No code deps: the model-check test (tests/model_check.rs) shells out to the
# `ty` TLA+ checker over the specs in `specs/`. The .tla/.cfg files ARE the crate.

[dev-dependencies]
# Test-only: the single shared verification-gate policy (present / loud-skip /
# fatal under ATERM_REQUIRE_TRUST=1). Test-only so the production crate stays
# dep-free — the .tla/.cfg files remain the whole crate.
aterm-spec = { workspace = true }
