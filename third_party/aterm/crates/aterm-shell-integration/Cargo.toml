[package]
name = "aterm-shell-integration"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Shell integration (OSC 7/133/633) — extracted from aterm-core for independent verification"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }

[features]
default = []
local-pty = ["dep:aterm-containment"]

[dependencies]
aterm-containment = { workspace = true, optional = true }
rand_core = { workspace = true }

[dev-dependencies]
aterm-tempfile = { workspace = true }
