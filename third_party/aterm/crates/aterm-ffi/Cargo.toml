[package]
name = "aterm-ffi"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "C ABI embedding surface for the aterm engine (ATERM_DESIGN WS-D): feed VT bytes, read the screen, from C or any FFI-capable language."

[lints.rust]
# `aterm_ffi_catch_unwind!` expands a `#[cfg(kani)]` branch; declare the cfg so the
# expansion in this (non-kani) crate does not trip the `unexpected_cfgs` lint.
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }

[lib]
crate-type = ["rlib", "staticlib", "cdylib"]

[dependencies]
aterm-core = { workspace = true }
# Provides `aterm_ffi_catch_unwind!`, which wraps every exported function body so
# a Rust panic returns a safe sentinel instead of unwinding across the C ABI (UB).
aterm-ffi-types = { workspace = true }
