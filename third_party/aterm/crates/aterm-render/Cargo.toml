[package]
name = "aterm-render"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "aterm CPU rasterizer: the terminal grid -> an RGBA framebuffer. The renderer core AND the read_image pixel-introspection oracle (headless, testable)."

[dependencies]
aterm-core = { workspace = true }
aterm-render-api = { workspace = true }
fontdue = "0.9"
png = "0.17"
rustybuzz = "0.20.1"
# Color-emoji (Apple Color Emoji `sbix` table) glyph extraction. fontdue is a
# monochrome rasterizer; ttf-parser reads the embedded per-glyph PNG bitmaps.
ttf-parser = "0.25"

[dev-dependencies]
libc = { workspace = true }
