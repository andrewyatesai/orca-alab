[package]
name = "aterm-update"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "aterm — silent, signature-pinned in-app updater that pulls notarized releases from GitHub and swaps the .app on next launch."

[dependencies]
# Manifest (aterm-appcast.toml) + the on-disk `ready.toml` staging marker.
toml = { workspace = true }
serde = { workspace = true }
# GitHub Releases API response is JSON; parse it (scoped to this crate only — the
# core engine crates stay JSON-free).
serde_json = { workspace = true }
# flock(2) for the apply critical section + renamex_np(RENAME_SWAP) for the atomic
# bundle swap. Already a workspace dependency (used by the control socket).
libc = { workspace = true }
# Reuse the single source-of-truth private-dir ownership predicate (no drift with
# the control socket's Application Support hardening).
aterm-types = { workspace = true }
# Route updater diagnostics through the global logger aterm-gui installs, so they
# land in the app log file (visible for a Finder-launched .app, unlike stderr).
aterm-log = { workspace = true }

[lints]
workspace = true
