[package]
name = "aterm-render"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "aterm CPU rasterizer: the terminal grid -> an RGBA framebuffer. The renderer core AND the read_image pixel-introspection oracle (headless, testable)."

[features]
default = ["disk-tier"]
# Disk-backed scrollback cold tier, forwarded through aterm-core. DEFAULT-ON so
# native builds are byte-identical; a wasm consumer disables it
# (--no-default-features) to drop libc/zstd-sys.
disk-tier = ["aterm-core/disk-tier", "aterm-render-api/disk-tier"]

[dependencies]
# Path (not `workspace = true`) so we can set default-features = false here without
# forcing it on every workspace consumer; disk-tier is re-enabled by default via this
# crate's own default = ["disk-tier"], so the native closure is unchanged.
aterm-core = { path = "../aterm-core", default-features = false }
aterm-render-api = { path = "../aterm-render-api", default-features = false }
fontdue = "0.9"
png = "0.17"
rustybuzz = "0.20.1"
# Color-emoji (Apple Color Emoji `sbix` table) glyph extraction. fontdue is a
# monochrome rasterizer; ttf-parser reads the embedded per-glyph PNG bitmaps.
ttf-parser = "0.25"

[dev-dependencies]
libc = { workspace = true }
# Base64 encoder for the inline-image (OSC 1337) integration tests.
aterm-codec = { workspace = true }

[lints]
workspace = true
