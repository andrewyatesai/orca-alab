<!doctype html>
<html>
  <head><meta charset="utf-8" /><style>body{margin:0;background:#111}</style></head>
  <body>
    <canvas id="c"></canvas>
    <script type="module">
      import init, { AtermTerminal } from './aterm_wasm.js'
      window.__done = false
      ;(async () => {
        await init('./aterm_wasm_bg.wasm')
        const font = new Uint8Array(await (await fetch('./font.ttf')).arrayBuffer())
        const t = new AtermTerminal(14, 66, font, 18)
        const enc = new TextEncoder()
        const w = (s) => t.process(enc.encode(s))
        w('\x1b[1;32materm\x1b[0m drawing in \x1b[1;34mChromium\x1b[0m — orca’s renderer engine\r\n')
        w('\x1b[33m$\x1b[0m printf "no xterm.js painting here\\n"\r\n')
        w('\x1b[7m inverse \x1b[0m \x1b[4munderline\x1b[0m  \x1b[31m●\x1b[33m●\x1b[32m●\x1b[36m●\x1b[34m●\x1b[35m●\x1b[0m  12345\r\n')
        w('box: ┌─┐  │ │  └─┘   table | col | col\r\n')
        t.render()
        const cw = t.width, ch = t.height
        const cv = document.getElementById('c')
        cv.width = cw
        cv.height = ch
        const ctx = cv.getContext('2d')
        ctx.putImageData(new ImageData(new Uint8ClampedArray(t.rgba()), cw, ch), 0, 0)
        const id=ctx.getImageData(0,0,cw,ch).data; let nb=0; const b=[id[0],id[1],id[2]]; for(let i=0;i<id.length;i+=4){ if(id[i]!==b[0]||id[i+1]!==b[1]||id[i+2]!==b[2]) nb++ } window.__nonbg=nb; window.__dims = { w: cw, h: ch }
        window.__done = true
      })().catch((e) => {
        window.__err = String(e && e.stack ? e.stack : e)
        window.__done = true
      })
    </script>
  </body>
</html>
