[package]
name = "aterm-grid"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Terminal grid model: cells, rows, styles, damage tracking, page storage, cursor and region state"

[features]
default = []
alacritty-compat = []  # Expose legacy Alacritty-facing CellFlags aliases
fuzz = ["aterm-scrollback/fuzz"]  # Expose fuzz-only APIs (#4258)
testing = []  # Expose test-only helpers for downstream crate tests
# TRUST_NATIVE_TLA §4 (Phase 4): register this crate's ring-buffer kani harnesses as
# `proof_anchor!`s in the unified verifier ledger. Pulls in aterm-spec ONLY to submit
# the (machine, action, proof) records; OFF by default so production builds stay free
# of aterm-spec. The anchors are decoupled from the `#[cfg(kani)]` harnesses.
spec-anchors = ["dep:aterm-spec"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)', 'cfg(fuzzing)'] }

[dependencies]
aterm-rle = { workspace = true }
# `disk-tier` (implies `zstd`) provides the `aterm_scrollback::mmap` wrapper that
# the grid's scrollback disk-spill (scrollback_budget.rs) maps over. This is a
# downstream opt-in; it does NOT change `aterm-scrollback`'s own default features,
# so `cargo tree -p aterm-scrollback` stays libc/zstd-free per §2.7.
aterm-scrollback = { workspace = true, features = ["disk-tier"] }
aterm-types = { workspace = true }
aterm-log = { workspace = true }
aterm-hash = { workspace = true }
aterm-alloc = { workspace = true }
aterm-tempfile = { workspace = true }
aterm-error = { workspace = true }
aterm-grapheme = { workspace = true }
# Phase-4 verifier-ledger anchors only (see `spec-anchors` feature). Optional and OFF
# by default so the default dependency closure is unchanged.
aterm-spec = { workspace = true, optional = true }

[dev-dependencies]
ntest = "0.9"
proptest = { workspace = true }
criterion = "0.5"
aterm-tempfile = { workspace = true }
# Phase-4: make aterm-spec available under plain `cargo test -p aterm-grid` so the
# `#[cfg(test)]`-visible `spec_proof_anchors` module compiles its `proof_anchor!`s.
aterm-spec = { workspace = true }

[[bench]]
name = "extras_shift"
harness = false

[[bench]]
name = "scroll_damage"
harness = false
