[package]
name = "orca-terminal"
version = "0.0.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Headless terminal emulation for Orca (replaces @xterm/headless): grid, cursor, cwd/OSC-7 tracking. A thin adapter over the aterm engine, which owns the VT parser, grid, scrollback, and SGR/colour model."

[dependencies]
# The aterm terminal engine (github.com/andrewyatesai/aterm) owns the headless
# VT pipeline: parser, grid, scrollback, SGR/colour model, OSC-7 cwd, mouse
# modes. `orca-terminal` is the anti-corruption layer that re-exposes aterm's
# `Terminal` under Orca's stable `HeadlessTerminal` surface so `orca-ffi` /
# `orca-session` and the native shells are unchanged. The aterm engine is a
# pinned git SUBMODULE at `rust/aterm` (pin = rust/aterm's checked-out commit) so
# clean-machine and packaged builds are self-contained — no `~/aterm` checkout
# required. Bump the pin + regenerate wasm/napi with `pnpm bump:aterm`. aterm's
# crates.io closure stays vendored under `rust/vendor` (offline).
# features = ["sixel"] compiles aterm-sixel (pure-Rust, zero-dep) into the engine
# so apps can send Sixel DCS: DA1 advertises code 4 and the decoder places the
# raster into the inline-image path the renderer blits. Default disk-tier stays on.
aterm-core = { path = "../../aterm/crates/aterm-core", features = ["sixel"] }
aterm-grid = { path = "../../aterm/crates/aterm-grid" }
aterm-types = { path = "../../aterm/crates/aterm-types" }
# Color-scheme (DEC mode 2031) sequence scanning. Literal/char-class matching
# only — no unicode tables needed.
regex = { version = "1", default-features = false, features = ["std", "perf"] }

[lints.rust]
unsafe_code = "forbid"
